<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>🚀 Weather Station Dashboard 🚀</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container { max-width: 800px; width: 100%; }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 1.3em;
      color: #667eea;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .metric-value {
      font-size: 2em;
      font-weight: bold;
    }

    .temp { color: #ff6b6b; }
    .humidity { color: #4ecdc4; }

    .weather-desc {
      text-align: center;
      font-size: 1.5em;
      color: #667eea;
      margin: 20px 0;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 10px;
    }

    .update-info {
      text-align: center;
      color: #999;
      margin-top: 20px;
    }
  </style>

  <script>
    function updateData() {
      fetch("https://api.open-meteo.com/v1/forecast?latitude=30.0444&longitude=31.2357&current_weather=true")
        .then(res => res.json())
        .then(data => {
          console.log(data);

          // Outdoor temperature
          document.getElementById("outTemp").textContent =
            data.current_weather.temperature + "°C";

          // Fake humidity (API doesn't give it easily)
          document.getElementById("outHum").textContent = "--%";

          // Weather description
          document.getElementById("weather").textContent =
            "Live Weather Data";

          // Indoor (still fake for now)
          document.getElementById("inTemp").textContent = "--°C";
          document.getElementById("inHum").textContent = "--%";

          // Update time
          document.getElementById("update").textContent =
            "Last updated: " + new Date().toLocaleTimeString();
        })
        .catch(err => console.error(err));
    }

    // Run on load + every 5 seconds
    window.onload = updateData;
    setInterval(updateData, 5000);
  </script>

</head>

<body>
  <div class="container">

    <div class="header">
      <h1>🌤️ Weather Station</h1>
      <p>Real-time Indoor & Outdoor Monitoring</p>
    </div>

    <div class="cards">

      <!-- Indoor -->
      <div class="card">
        <div class="card-title">🏠 Indoor Climate</div>

        <div class="metric">
          <span>Temperature</span>
          <span class="metric-value temp" id="inTemp">--°C</span>
        </div>

       
      </div>

      <!-- Outdoor -->
      <div class="card">
        <div class="card-title">🌍 Outdoor Weather</div>

        <div class="weather-desc" id="weather">Loading...</div>

        <div class="metric">
          <span>Temperature</span>
          <span class="metric-value temp" id="outTemp">--°C</span>
        </div>

        
      </div>

    </div>

    <div class="update-info" id="update">Loading...</div>

  </div>
</body>
</html>
